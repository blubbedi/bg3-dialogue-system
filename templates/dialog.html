<div class="bg3-dialog-wrapper">
    <div class="bg3-header">
        <img src="{{npcImg}}" class="bg3-portrait">
        <h2 class="bg3-npc-name">{{npcName}}</h2>
    </div>
    <div class="bg3-body">
        <p class="bg3-main-text">{{text}}</p>
    </div>
    <div class="bg3-footer">
        <ul class="bg3-options-list">
            {{#each options as |opt i|}}
                <li class="dialog-option {{#if ../isObserver}}disabled{{/if}}" data-index="{{i}}">
                    <span class="opt-number">{{add i 1}}.</span> {{opt.text}}
                </li>
            {{/each}}
        </ul>
        {{#if isObserver}}
            <p style="color: #c1a35b; text-align: center; margin-top: 15px; font-weight: bold;">
                <i class="fas fa-eye"></i> GM-ANSICHT: Warte auf Spieler...
            </p>
        {{/if}}
    </div>
</div>
