name: Release Creation

on:
  push:
    tags:
      - 'v*' # Löst aus, wenn du einen Tag wie v1.0.0 pushst

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Erlaubt dem Bot, das Release zu erstellen
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Get Version
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      # Dieser Schritt schreibt die Version und URLs automatisch in die module.json
      - name: Update module.json
        run: |
          node << 'EOF'
          const fs = require('fs');
          const manifest = JSON.parse(fs.readFileSync('module.json', 'utf8'));
          const version = "${{ steps.get_version.outputs.VERSION }}".replace('v', '');
          
          manifest.version = version;
          manifest.url = "https://github.com/blubbedi/bg3-dialogue-system";
          manifest.manifest = `https://github.com/blubbedi/bg3-dialogue-system/releases/latest/download/module.json`;
          manifest.download = `https://github.com/blubbedi/bg3-dialogue-system/releases/download/${{ steps.get_version.outputs.VERSION }}/module.zip`;
          
          fs.writeFileSync('module.json', JSON.stringify(manifest, null, 2));
          EOF

      - name: Create Zip
        run: |
          # Packt das Modul, schließt Git- und Github-Ordner aus
          zip -r ./module.zip . -x "*.git*" ".github/*"

      - name: Update Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: Release ${{ steps.get_version.outputs.VERSION }}
          files: |
            module.json
            module.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}